<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANNER DA MINHA ESPOSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container-principal"> 
        <img src="img/helloKitty1.png" class="sticker hk-fixa-1">
        <img src="img/helloKitty2.png" class="sticker hk-fixa-2">
        <img src="img/helloKitty4 (1).png" class="sticker hk-fixa-3">  

        <div class="header-weekly">
            <svg viewBox="0 0 600 150" class="curved-title">
                <path id="curve" d="M50,120 Q300,30 550,120" fill="transparent"/>
                <text><textPath xlink:href="#curve" startOffset="50%" text-anchor="middle">WEEKLY PLANNER</textPath></text>
            </svg>
        </div>

        <!-- Data da semana (movida mais para a esquerda para não ficar em cima da imagem) -->
        <div class="week-badge" id="week-badge"></div>

        <div class="wrapper">
            <nav id="plannerGrid" class="containerPlanner">
                <button onclick="resetarPainel()" class="btn-home">🏠 Início</button>
                <div class="daysWeek">Domingo</div>
                <div class="daysWeek">Segunda</div>
                <div class="daysWeek">Terça</div>
                <div class="daysWeek">Quarta</div>
                <div class="daysWeek">Quinta</div>
                <div class="daysWeek">Sexta</div>
                <div class="daysWeek">Sábado</div>
            </nav>

            <main id="areaConteudo">
                <div id="verHorarios">
                    <div id="conteudo-boas-vindas" class="painel-boas-vindas">
                        <img src="img/itadori.png" class="itadori-inicio">
                    </div>
                </div>
            </main>
        </div>
    </div> 

    <div id="tela-rotina" style="display: none;">
        <div class="header-rotina">
            <button onclick="voltarParaPlanner()" id="btn-voltar">← Voltar</button>
            <h2 id="hora-selecionada">08:00</h2>
            
            <!-- NOVO BOTÃO LIMPAR (exatamente como no código da IA, com mesma estilização) -->
            <button onclick="confirmarLimpar()" class="btn-limpar">Limpar</button>
        </div>
        <div class="planner-folha">
            <img src="img/helloKitty2.png" class="sticker hk-rotina-2">
            <img src="img/helloKitty3.png" class="sticker hk-rotina-3">
            <img src="img/helloKittyKiraTrue.png" class="sticker hk-rotina-4">
            <div class="topo-folha">
                <div class="prioridades-box">
                    <h3>PRIORIDADES</h3>
                    <div class="prio-list">
                        <div class="prio-item">
                            <span class="prio-num">1</span>
                            <input type="text" id="prio1" placeholder="Primeira prioridade...">
                        </div>
                        <div class="prio-item">
                            <span class="prio-num">2</span>
                            <input type="text" id="prio2" placeholder="Segunda prioridade...">
                        </div>
                        <div class="prio-item">
                            <span class="prio-num">3</span>
                            <input type="text" id="prio3" placeholder="Terceira prioridade...">
                        </div>
                    </div>
                </div>
            </div>
            <div class="corpo-folha">
                <h3>PARA FAZER</h3>
                <textarea id="texto-rotina" placeholder="Escreva aqui..."></textarea>
                <button onclick="salvarDados()" id="btn-salvar">Guardar Rotina 🎀</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast">
        <span class="toast-icon">🎀</span>
        <span id="toast-msg">Salvo!</span>
    </div>

    <!-- MODAL CONFIRMAR LIMPAR (mesma mensagem e estilização da IA) -->
    <div id="modal-overlay">
        <div id="modal-box">
            <h3>Limpar rotina?</h3>
            <p>Isso vai apagar as prioridades e anotações deste horário.</p>
            <div class="modal-btns">
                <button class="btn-modal-cancel" onclick="fecharModal()">Cancelar</button>
                <button class="btn-modal-confirm" onclick="limparDados()">Limpar</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
